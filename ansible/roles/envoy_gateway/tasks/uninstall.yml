---
# Removes Envoy Gateway Kubernetes resources when Kubernetes is available.
- name: Check for Kubernetes admin kubeconfig
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: envoy_gateway_kubeconfig

- name: Check for Helm binary
  ansible.builtin.stat:
    path: "{{ helm_binary_path }}"
  register: envoy_gateway_helm_binary

- name: Inspect current Envoy Gateway release
  ansible.builtin.command:
    argv:
      - "{{ helm_binary_path }}"
      - list
      - --namespace
      - "{{ envoy_gateway_namespace }}"
      - -o
      - json
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: envoy_gateway_release_list
  failed_when: false
  changed_when: false
  when:
    - envoy_gateway_kubeconfig.stat.exists
    - envoy_gateway_helm_binary.stat.exists

- name: Uninstall Envoy Gateway release
  ansible.builtin.command:
    argv:
      - "{{ helm_binary_path }}"
      - uninstall
      - "{{ envoy_gateway_release_name }}"
      - --namespace
      - "{{ envoy_gateway_namespace }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: envoy_gateway_uninstall
  failed_when: false
  changed_when: envoy_gateway_uninstall.rc == 0 and 'uninstalled' in envoy_gateway_uninstall.stdout
  when:
    - envoy_gateway_kubeconfig.stat.exists
    - envoy_gateway_helm_binary.stat.exists
    - envoy_gateway_release_list.stdout is search('"name":"' ~ envoy_gateway_release_name ~ '"')

- name: Remove Envoy Gateway namespace
  ansible.builtin.command:
    argv:
      - kubectl
      - delete
      - namespace
      - "{{ envoy_gateway_namespace }}"
      - --ignore-not-found=true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: envoy_gateway_ns_delete
  failed_when: false
  changed_when: "'deleted' in envoy_gateway_ns_delete.stdout"
  when: envoy_gateway_kubeconfig.stat.exists

- name: Wait for Envoy Gateway namespace removal
  ansible.builtin.command:
    argv:
      - kubectl
      - wait
      - --for=delete
      - namespace/{{ envoy_gateway_namespace }}
      - --timeout=5m
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: envoy_gateway_ns_wait
  failed_when: false
  changed_when: false
  when:
    - envoy_gateway_kubeconfig.stat.exists
    - "'deleted' in envoy_gateway_ns_delete.stdout"
