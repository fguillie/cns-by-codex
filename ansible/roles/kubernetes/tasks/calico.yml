---
- name: Validate supported pod CIDR for Calico manifest
  ansible.builtin.assert:
    that:
      - cns_pod_cidr == '192.168.0.0/16'
    fail_msg: "The bundled Calico install path currently supports pod CIDR 192.168.0.0/16 only."

- name: Inspect deployed Calico node version
  ansible.builtin.command:
    argv:
      - kubectl
      - get
      - daemonset/calico-node
      - -n
      - kube-system
      - -o
      - yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: calico_node_state
  failed_when: false
  changed_when: false

- name: Inspect deployed Calico kube-controllers version
  ansible.builtin.command:
    argv:
      - kubectl
      - get
      - deployment/calico-kube-controllers
      - -n
      - kube-system
      - -o
      - yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: calico_kube_controllers_state
  failed_when: false
  changed_when: false

- name: Apply Calico manifest
  ansible.builtin.command:
    argv:
      - kubectl
      - apply
      - -f
      - "{{ calico_manifest_url }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: calico_apply
  changed_when: "'created' in calico_apply.stdout or 'configured' in calico_apply.stdout"
  when: >
    calico_node_state.rc != 0 or
    calico_kube_controllers_state.rc != 0 or
    ('v' ~ calico_version) not in calico_node_state.stdout or
    ('v' ~ calico_version) not in calico_kube_controllers_state.stdout

- name: Wait for Calico node daemonset rollout
  ansible.builtin.command:
    argv:
      - kubectl
      - -n
      - kube-system
      - rollout
      - status
      - daemonset/calico-node
      - --timeout=300s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Wait for Calico kube-controllers rollout
  ansible.builtin.command:
    argv:
      - kubectl
      - -n
      - kube-system
      - rollout
      - status
      - deployment/calico-kube-controllers
      - --timeout=300s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false
