---
# Installs and configures containerd for Kubernetes and GPU Operator workloads.
- name: Download containerd archive
  ansible.builtin.get_url:
    url: "{{ containerd_archive_url }}"
    dest: "{{ containerd_archive_path }}"
    mode: "0644"
    timeout: "{{ cns_download_timeout }}"
  register: containerd_archive_download
  retries: 3
  delay: 10
  until: containerd_archive_download is succeeded

- name: Install containerd binaries
  ansible.builtin.unarchive:
    src: "{{ containerd_archive_path }}"
    dest: /usr/local
    remote_src: true

- name: Download runc binary
  ansible.builtin.get_url:
    url: "{{ runc_binary_url }}"
    dest: "{{ runc_binary_path }}"
    mode: "0755"
    timeout: "{{ cns_download_timeout }}"
  register: runc_binary_download
  retries: 3
  delay: 10
  until: runc_binary_download is succeeded

- name: Create CNI plugin directory
  ansible.builtin.file:
    path: "{{ cni_bin_dir }}"
    state: directory
    mode: "0755"

- name: Download CNI plugins
  ansible.builtin.get_url:
    url: "{{ cni_plugins_url }}"
    dest: "{{ cni_plugins_archive_path }}"
    mode: "0644"
    timeout: "{{ cns_download_timeout }}"
  register: cni_plugins_download
  retries: 3
  delay: 10
  until: cni_plugins_download is succeeded

- name: Install CNI plugins
  ansible.builtin.unarchive:
    src: "{{ cni_plugins_archive_path }}"
    dest: "{{ cni_bin_dir }}"
    remote_src: true
    creates: "{{ cni_bin_dir }}/host-local"

- name: Create containerd configuration directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Create containerd drop-in configuration directory
  ansible.builtin.file:
    path: /etc/containerd/conf.d
    state: directory
    mode: "0755"

- name: Check whether Kubernetes is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: containerd_kubernetes_initialized

- name: Inspect current containerd config
  ansible.builtin.stat:
    path: /etc/containerd/config.toml
  register: containerd_config_file

- name: Read current containerd config
  ansible.builtin.slurp:
    path: /etc/containerd/config.toml
  register: containerd_config_current
  when: containerd_config_file.stat.exists

- name: Decide whether CNS should install containerd config
  ansible.builtin.set_fact:
    containerd_config_needs_install: >-
      {{
        not containerd_kubernetes_initialized.stat.exists
        or not containerd_config_file.stat.exists
        or 'version = 4' not in (containerd_config_current.content | default('') | b64decode)
      }}

- name: Create systemd unit directory for containerd
  ansible.builtin.file:
    path: /usr/local/lib/systemd/system
    state: directory
    mode: "0755"

- name: Install containerd systemd unit
  ansible.builtin.template:
    src: containerd.service.j2
    dest: /usr/local/lib/systemd/system/containerd.service
    mode: "0644"
  notify: Restart containerd

- name: Install containerd config
  ansible.builtin.template:
    src: config.toml.j2
    dest: /etc/containerd/config.toml
    mode: "0644"
  notify: Restart containerd
  when: containerd_config_needs_install | bool

- name: Flush containerd handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure containerd is enabled and running
  ansible.builtin.systemd:
    name: "{{ containerd_service_name }}"
    state: started
    enabled: true
    daemon_reload: true
