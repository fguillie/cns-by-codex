---
# Prepares the Ubuntu host for Kubernetes installation.
- name: Verify supported operating system
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Ubuntu"
      - ansible_distribution_version == "24.04"
    fail_msg: "CNS supports Ubuntu 24.04 only."

- name: Ensure prerequisite packages are installed
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - conntrack
      - curl
      - ebtables
      - ethtool
      - gpg
      - ipset
      - iptables
      - jq
      - socat
      - tar
    state: present
    update_cache: true

- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb | int > 0
  changed_when: ansible_swaptotal_mb | int > 0

- name: Disable swap in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s+.*)$'
    replace: '# \1'

- name: Load required kernel modules on boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/cns-k8s.conf
    mode: "0644"
    content: |
      overlay
      br_netfilter

- name: Load kernel modules now
  ansible.builtin.command:
    argv:
      - modprobe
      - "{{ item }}"
  loop:
    - overlay
    - br_netfilter
  changed_when: false

- name: Configure Kubernetes sysctls
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-cns-kubernetes.conf
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
  notify: Reload sysctl

- name: Flush handlers before continuing
  ansible.builtin.meta: flush_handlers
