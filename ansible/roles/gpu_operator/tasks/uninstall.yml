---
# Removes the NVIDIA GPU Operator release when Kubernetes is available.
- name: Check for Kubernetes admin kubeconfig
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: gpu_operator_kubeconfig

- name: Check for Helm binary
  ansible.builtin.stat:
    path: "{{ helm_binary_path }}"
  register: gpu_operator_helm_binary

- name: Inspect current GPU Operator release
  ansible.builtin.command:
    argv:
      - "{{ helm_binary_path }}"
      - list
      - --namespace
      - "{{ gpu_operator_namespace }}"
      - -o
      - json
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: gpu_operator_release_list
  failed_when: false
  changed_when: false
  when:
    - gpu_operator_kubeconfig.stat.exists
    - gpu_operator_helm_binary.stat.exists

- name: Uninstall GPU Operator release
  ansible.builtin.command:
    argv:
      - "{{ helm_binary_path }}"
      - uninstall
      - "{{ gpu_operator_release_name }}"
      - --namespace
      - "{{ gpu_operator_namespace }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: gpu_operator_uninstall
  failed_when: false
  changed_when: gpu_operator_uninstall.rc == 0 and 'uninstalled' in gpu_operator_uninstall.stdout
  when:
    - gpu_operator_kubeconfig.stat.exists
    - gpu_operator_helm_binary.stat.exists
    - gpu_operator_release_list.stdout is search('"name":"' ~ gpu_operator_release_name ~ '"')

- name: Remove GPU Operator namespace
  ansible.builtin.command:
    argv:
      - kubectl
      - delete
      - namespace
      - "{{ gpu_operator_namespace }}"
      - --ignore-not-found=true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: gpu_operator_ns_delete
  failed_when: false
  changed_when: "'deleted' in gpu_operator_ns_delete.stdout"
  when: gpu_operator_kubeconfig.stat.exists
