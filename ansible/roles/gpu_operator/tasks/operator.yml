---
# Deploys and verifies the NVIDIA GPU Operator release.
- name: Set desired GPU Operator driver container version
  ansible.builtin.set_fact:
    gpu_operator_driver_version: "{{ cns_cuda_driver_container_version | default(cuda_driver_container_version | default('', true), true) }}"

- name: Label GPU Operator namespace for privileged PSA
  ansible.builtin.command:
    argv:
      - kubectl
      - label
      - namespace
      - "{{ gpu_operator_namespace }}"
      - pod-security.kubernetes.io/enforce=privileged
      - --overwrite
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  failed_when: false
  changed_when: false

- name: Ensure GPU Operator namespace exists
  ansible.builtin.command:
    argv:
      - kubectl
      - create
      - namespace
      - "{{ gpu_operator_namespace }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: gpu_namespace_create
  failed_when: gpu_namespace_create.rc != 0 and 'AlreadyExists' not in gpu_namespace_create.stderr
  changed_when: gpu_namespace_create.rc == 0

- name: Label GPU Operator namespace after creation
  ansible.builtin.command:
    argv:
      - kubectl
      - label
      - namespace
      - "{{ gpu_operator_namespace }}"
      - pod-security.kubernetes.io/enforce=privileged
      - --overwrite
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Inspect GPU Operator driver kernel module config
  ansible.builtin.command:
    argv:
      - kubectl
      - get
      - configmap
      - "{{ gpu_operator_driver_kernel_module_config_name }}"
      - -n
      - "{{ gpu_operator_namespace }}"
      - -o
      - jsonpath={.data.nvidia\.conf}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: gpu_operator_kernel_module_config
  failed_when: false
  changed_when: false

- name: Configure GPU Operator driver kernel module params
  ansible.builtin.shell:
    cmd: >
      kubectl -n {{ gpu_operator_namespace | quote }}
      create configmap {{ gpu_operator_driver_kernel_module_config_name | quote }}
      --from-literal=nvidia.conf={{ gpu_operator_driver_kernel_module_config_nvidia_conf | quote }}
      --dry-run=client -o yaml |
      kubectl apply -f -
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: gpu_operator_kernel_module_config_apply
  changed_when: gpu_operator_kernel_module_config_apply.stdout is search('created|configured')
  when: >
    gpu_operator_kernel_module_config.rc != 0 or
    gpu_operator_kernel_module_config.stdout != gpu_operator_driver_kernel_module_config_nvidia_conf

- name: Check configured Helm repositories
  ansible.builtin.command:
    argv:
      - "{{ helm_binary_path }}"
      - repo
      - list
  register: helm_repo_list
  changed_when: false

- name: Inspect current GPU Operator release
  ansible.builtin.command:
    argv:
      - "{{ helm_binary_path }}"
      - list
      - --namespace
      - "{{ gpu_operator_namespace }}"
      - -o
      - json
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: gpu_operator_release_list
  changed_when: false

- name: Set current GPU Operator release state
  ansible.builtin.set_fact:
    gpu_operator_current_release: "{{ ((gpu_operator_release_list.stdout | from_json) | selectattr('name', 'equalto', gpu_operator_release_name) | list | first) | default({}, true) }}"

- name: Inspect current GPU Operator values
  ansible.builtin.command:
    argv:
      - "{{ helm_binary_path }}"
      - get
      - values
      - "{{ gpu_operator_release_name }}"
      - --namespace
      - "{{ gpu_operator_namespace }}"
      - --all
      - -o
      - json
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: gpu_operator_release_values
  failed_when: false
  changed_when: false
  when: gpu_operator_current_release | length > 0

- name: Set current GPU Operator driver container version
  ansible.builtin.set_fact:
    gpu_operator_current_driver_values: "{{ (gpu_operator_release_values.stdout | default('{}', true) | from_json | default({}, true)).get('driver', {}) }}"
  when: gpu_operator_current_release | length > 0

- name: Add NVIDIA Helm repository
  ansible.builtin.command:
    argv:
      - "{{ helm_binary_path }}"
      - repo
      - add
      - "{{ gpu_operator_repo_name }}"
      - "{{ gpu_operator_repo_url }}"
  register: helm_repo_add
  failed_when: helm_repo_add.rc != 0
  changed_when: helm_repo_add.rc == 0
  when: gpu_operator_repo_url not in helm_repo_list.stdout

- name: Update Helm repositories
  ansible.builtin.command:
    argv:
      - "{{ helm_binary_path }}"
      - repo
      - update
  changed_when: false

- name: Install or upgrade GPU Operator
  ansible.builtin.command:
    argv:
      - "{{ helm_binary_path }}"
      - upgrade
      - --install
      - "{{ gpu_operator_release_name }}"
      - "{{ gpu_operator_chart }}"
      - --namespace
      - "{{ gpu_operator_namespace }}"
      - --version={{ gpu_operator_version }}
      - --set
      - operator.defaultRuntime=containerd
      - --set-string
      - driver.version={{ gpu_operator_driver_version }}
      - --set
      - driver.kernelModuleType={{ gpu_operator_driver_kernel_module_type }}
      - --set
      - driver.kernelModuleConfig.name={{ gpu_operator_driver_kernel_module_config_name }}
      - --wait
      - --timeout=20m
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: gpu_operator_install
  changed_when: "'STATUS: deployed' in gpu_operator_install.stdout or 'STATUS: pending-upgrade' in gpu_operator_install.stdout"
  when: >
    (gpu_operator_current_release | length) == 0 or
    gpu_operator_current_release.get('status', '') != 'deployed' or
    gpu_operator_current_release.get('chart', '') != ('gpu-operator-' ~ gpu_operator_version) or
    (gpu_operator_current_driver_values | default({})).get('version', '') != gpu_operator_driver_version or
    (gpu_operator_current_driver_values | default({})).get('kernelModuleType', '') != gpu_operator_driver_kernel_module_type or
    (gpu_operator_current_driver_values | default({})).get('kernelModuleConfig', {}).get('name', '') != gpu_operator_driver_kernel_module_config_name

- name: Wait for GPU Operator pods to appear
  ansible.builtin.command:
    argv:
      - kubectl
      - get
      - pods
      - -n
      - "{{ gpu_operator_namespace }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: gpu_operator_pods
  retries: 20
  delay: 15
  until: gpu_operator_pods.rc == 0 and ('gpu-operator' in gpu_operator_pods.stdout or 'nvidia' in gpu_operator_pods.stdout)
  changed_when: false
