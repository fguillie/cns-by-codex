---
# Cleans conflicting NVIDIA/CUDA driver state before a fresh install.
- name: Check whether Kubernetes is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: precheck_kubernetes_initialized

- name: Skip driver cleanup on already initialized CNS nodes
  ansible.builtin.debug:
    msg: "Kubernetes is already initialized; skipping GPU driver cleanup."
  when: precheck_kubernetes_initialized.stat.exists

- name: Check whether Nouveau module is active
  ansible.builtin.command:
    argv:
      - lsmod
  register: precheck_lsmod_initial
  changed_when: false
  when: not precheck_kubernetes_initialized.stat.exists

- name: Check installed Nouveau packages
  ansible.builtin.shell: |
    set -o pipefail
    dpkg-query -W -f='${binary:Package}\n' {{ precheck_nouveau_packages | join(' ') }} 2>/dev/null | sort -u
  args:
    executable: /bin/bash
  register: precheck_nouveau_installed_packages
  changed_when: false
  failed_when: false
  when: not precheck_kubernetes_initialized.stat.exists

- name: Remove installed Nouveau packages
  ansible.builtin.apt:
    name: "{{ precheck_nouveau_installed_packages.stdout_lines }}"
    state: absent
    purge: true
    autoremove: true
  when:
    - not precheck_kubernetes_initialized.stat.exists
    - precheck_nouveau_installed_packages.stdout_lines | default([]) | length > 0

- name: Disable Nouveau module loading
  ansible.builtin.copy:
    dest: "{{ precheck_nouveau_blacklist_file }}"
    mode: "0644"
    content: |
      blacklist nouveau
      options nouveau modeset=0
  when:
    - not precheck_kubernetes_initialized.stat.exists
    - >
      'nouveau' in (precheck_lsmod_initial.stdout | default('')) or
      precheck_nouveau_installed_packages.stdout_lines | default([]) | length > 0
  notify: Update initramfs

- name: Try to unload Nouveau when active
  ansible.builtin.command:
    argv:
      - modprobe
      - -r
      - nouveau
  register: precheck_unload_nouveau
  failed_when: false
  changed_when: precheck_unload_nouveau.rc == 0
  when:
    - not precheck_kubernetes_initialized.stat.exists
    - "'nouveau' in (precheck_lsmod_initial.stdout | default(''))"

- name: Check installed CUDA and NVIDIA driver packages
  ansible.builtin.shell: |
    set -o pipefail
    dpkg-query -W -f='${binary:Package}\n' {{ precheck_cuda_package_patterns | join(' ') }} 2>/dev/null | sort -u
  args:
    executable: /bin/bash
  register: precheck_cuda_packages
  changed_when: false
  failed_when: false
  when: not precheck_kubernetes_initialized.stat.exists

- name: Remove CUDA and NVIDIA driver packages
  ansible.builtin.apt:
    name: "{{ precheck_cuda_packages.stdout_lines }}"
    state: absent
    purge: true
    autoremove: true
  when:
    - not precheck_kubernetes_initialized.stat.exists
    - precheck_cuda_packages.stdout_lines | default([]) | length > 0
  notify: Update initramfs

- name: Remove stale GPU Operator runtime artifacts
  ansible.builtin.shell: |
    set -o pipefail
    changed=0

    for path in {{ gpu_operator_runtime_mount_paths | map('quote') | join(' ') }}; do
      mounted_targets="$(findmnt -Rnr -o TARGET "$path" 2>/dev/null | sort -r || true)"
      if [ -n "$mounted_targets" ]; then
        while IFS= read -r target; do
          umount "$target" || umount -l "$target"
        done <<< "$mounted_targets"
        changed=1
      fi
    done

    for path in {{ gpu_operator_runtime_artifact_paths | map('quote') | join(' ') }}; do
      if [ -e "$path" ] || [ -L "$path" ]; then
        rm -rf --one-file-system "$path"
        changed=1
      fi
    done

    if [ "$changed" -eq 1 ]; then
      echo changed
    fi
  args:
    executable: /bin/bash
  register: precheck_gpu_operator_runtime_cleanup
  changed_when: "'changed' in precheck_gpu_operator_runtime_cleanup.stdout"
  when: not precheck_kubernetes_initialized.stat.exists

- name: Try to unload NVIDIA kernel modules when active
  ansible.builtin.command:
    argv:
      - rmmod
      - "{{ item }}"
  loop: "{{ precheck_nvidia_kernel_modules }}"
  register: precheck_unload_nvidia
  failed_when: false
  changed_when: precheck_unload_nvidia.rc == 0
  when:
    - not precheck_kubernetes_initialized.stat.exists
    - "'nvidia' in (precheck_lsmod_initial.stdout | default(''))"

- name: Flush pre-check handlers
  ansible.builtin.meta: flush_handlers
  when: not precheck_kubernetes_initialized.stat.exists

- name: Re-check loaded kernel modules
  ansible.builtin.command:
    argv:
      - lsmod
  register: precheck_lsmod_final
  changed_when: false
  when: not precheck_kubernetes_initialized.stat.exists

- name: Validate Nouveau is not active
  ansible.builtin.assert:
    that:
      - "'nouveau' not in precheck_lsmod_final.stdout"
    fail_msg: "Nouveau is still active. Reboot the node and rerun CNS install."
  when: not precheck_kubernetes_initialized.stat.exists

- name: Validate CUDA/NVIDIA driver modules are not active
  ansible.builtin.assert:
    that:
      - "'nvidia' not in precheck_lsmod_final.stdout"
    fail_msg: "An NVIDIA/CUDA driver kernel module is still active. Reboot the node and rerun CNS install."
  when: not precheck_kubernetes_initialized.stat.exists
