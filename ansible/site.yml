---
# Coordinates validation and CNS role execution for install and uninstall actions.
- name: Install or uninstall CNS on a single node
  hosts: cns_nodes
  become: true
  gather_facts: true

  pre_tasks:
    - name: Validate requested action
      ansible.builtin.assert:
        that:
          - cns_action in ['install', 'uninstall']
        fail_msg: "cns_action must be either 'install' or 'uninstall'."

    - name: Validate stack variables for installs
      ansible.builtin.assert:
        that:
          - cns_stack_version is defined
          - kubernetes_version is defined
          - kubernetes_package_version is defined
          - containerd_version is defined
          - calico_version is defined
          - install_gpu_operator is defined
          - install_nfs_provisioner is defined
          - install_gpu_operator | string | lower in ['true', 'false']
          - install_nfs_provisioner | string | lower in ['true', 'false']
        fail_msg: "Install requires a stack file from stacks/<version>.yml with valid install_gpu_operator and install_nfs_provisioner values."
      when: cns_action == 'install'

    - name: Validate GPU Operator stack variables for installs
      ansible.builtin.assert:
        that:
          - gpu_operator_version is defined
          - helm_version is defined
          - cuda_driver_container_version is defined
          - (cuda_driver_container_version | string | length) > 0
        fail_msg: "GPU Operator install requires gpu_operator_version, helm_version, and cuda_driver_container_version in the selected stack file."
      when:
        - cns_action == 'install'
        - install_gpu_operator | bool

    - name: Validate NFS provisioner stack variables for installs
      ansible.builtin.assert:
        that:
          - nfs_subdir_external_provisioner_version is defined
          - helm_version is defined
        fail_msg: "NFS provisioner install requires nfs_subdir_external_provisioner_version and helm_version in the selected stack file."
      when:
        - cns_action == 'install'
        - install_nfs_provisioner | bool

  tasks:
    - name: Uninstall GPU Operator first
      ansible.builtin.import_role:
        name: gpu_operator
      when: cns_action == 'uninstall'

    - name: Uninstall NFS provisioner
      ansible.builtin.import_role:
        name: nfs_provisioner
      when: cns_action == 'uninstall'

    - name: Remove Helm client
      ansible.builtin.import_role:
        name: helm_client
      when: cns_action == 'uninstall'

    - name: Uninstall Kubernetes stack
      ansible.builtin.import_role:
        name: kubernetes
      when: cns_action == 'uninstall'

    - name: Run install pre-checks
      ansible.builtin.import_role:
        name: precheck
      when:
        - cns_action == 'install'
        - install_gpu_operator | bool

    - name: Install Kubernetes stack
      ansible.builtin.import_role:
        name: kubernetes
      when: cns_action == 'install'

    - name: Install Helm client
      ansible.builtin.import_role:
        name: helm_client
      when:
        - cns_action == 'install'
        - (install_gpu_operator | bool) or (install_nfs_provisioner | bool)

    - name: Install NFS provisioner
      ansible.builtin.import_role:
        name: nfs_provisioner
      when:
        - cns_action == 'install'
        - install_nfs_provisioner | bool

    - name: Install GPU Operator
      ansible.builtin.import_role:
        name: gpu_operator
      when:
        - cns_action == 'install'
        - install_gpu_operator | bool
