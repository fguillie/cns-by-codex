---
# Defines default CNS variables shared across roles.
default_calico_version: "3.32.0"
cns_action: install
cns_cluster_name: cns
cns_gpu_operator_enabled: true
cns_nfs_provisioner_enabled: true
cns_pod_cidr: 192.168.0.0/16
cns_service_cidr: 10.96.0.0/12
cns_admin_user: "{{ ansible_user | default('ubuntu') }}"
cns_admin_home: "{{ '/root' if cns_admin_user == 'root' else (ansible_user_dir | default('/home/' ~ cns_admin_user)) }}"
cns_download_timeout: 60

kubernetes_cri_socket: unix:///run/containerd/containerd.sock
kubernetes_packages:
  - "kubelet={{ kubernetes_package_version }}"
  - "kubeadm={{ kubernetes_package_version }}"
  - "kubectl={{ kubernetes_package_version }}"

kubernetes_apt_key_url: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_series }}/deb/Release.key"
kubernetes_apt_repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_series }}/deb/ /"

containerd_archive_url: "https://github.com/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ containerd_version }}-linux-amd64.tar.gz"
containerd_archive_path: "/tmp/containerd-{{ containerd_version }}-linux-amd64.tar.gz"
containerd_service_name: containerd

runc_version: "1.3.4"
runc_binary_url: "https://github.com/opencontainers/runc/releases/download/v{{ runc_version }}/runc.amd64"
runc_binary_path: /usr/local/sbin/runc

cni_plugins_version: "1.8.0"
cni_plugins_url: "https://github.com/containernetworking/plugins/releases/download/v{{ cni_plugins_version }}/cni-plugins-linux-amd64-v{{ cni_plugins_version }}.tgz"
cni_plugins_archive_path: "/tmp/cni-plugins-linux-amd64-v{{ cni_plugins_version }}.tgz"
cni_bin_dir: /opt/cni/bin

calico_manifest_url: "https://raw.githubusercontent.com/projectcalico/calico/v{{ calico_version | default(default_calico_version) }}/manifests/calico.yaml"

helm_archive_url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
helm_archive_path: "/tmp/helm-{{ helm_version }}-linux-amd64.tar.gz"
helm_binary_path: /usr/local/bin/helm

gpu_operator_namespace: gpu-operator
gpu_operator_release_name: gpu-operator
gpu_operator_repo_name: nvidia
gpu_operator_repo_url: https://helm.ngc.nvidia.com/nvidia
gpu_operator_chart: nvidia/gpu-operator

nfs_provisioner_namespace: nfs-provisioner
nfs_provisioner_release_name: nfs-subdir-external-provisioner
nfs_provisioner_repo_name: nfs-subdir-external-provisioner
nfs_provisioner_repo_url: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
nfs_provisioner_chart: nfs-subdir-external-provisioner/nfs-subdir-external-provisioner
nfs_provisioner_export_path: /srv/cns/nfs
nfs_provisioner_export_file: /etc/exports.d/cns-nfs-provisioner.exports
nfs_provisioner_export_options: "*(rw,sync,no_subtree_check,no_root_squash)"
nfs_provisioner_service_name: nfs-kernel-server
nfs_provisioner_server: "{{ ansible_default_ipv4.address | default(ansible_host) }}"
nfs_provisioner_storage_class: nfs-client
nfs_provisioner_default_class: true
nfs_provisioner_packages:
  - nfs-kernel-server
  - nfs-common
